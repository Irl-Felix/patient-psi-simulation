<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient-Ψ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #ffffff;
            color: #1a1a1a;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 20px 32px;
            border-bottom: 1px solid #eeeeee;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            font-size: 16px;
            font-weight: 500;
            color: #1a1a1a;
        }

        #mode-select {
            font-size: 13px;
            padding: 6px 12px;
            border: 1px solid #dddddd;
            border-radius: 6px;
            background: white;
            color: #1a1a1a;
            cursor: pointer;
            outline: none;
        }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            max-width: 620px;
            line-height: 1.6;
            font-size: 14.5px;
        }

        .message.user {
            align-self: flex-end;
            background: #f4f4f4;
            padding: 12px 16px;
            border-radius: 12px 12px 2px 12px;
            color: #1a1a1a;
        }

        .message.ai {
            align-self: flex-start;
            color: #1a1a1a;
        }

        .message .label {
            font-size: 11px;
            color: #999999;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .typing {
            align-self: flex-start;
            color: #999999;
            font-size: 13px;
            font-style: italic;
        }

        footer {
            padding: 20px 32px;
            border-top: 1px solid #eeeeee;
            display: flex;
            gap: 12px;
        }

        #input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #dddddd;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            font-family: inherit;
            resize: none;
            height: 48px;
            line-height: 1.4;
        }

        #input:focus {
            border-color: #aaaaaa;
        }

        #send {
            padding: 12px 24px;
            background: #1a1a1a;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            font-family: inherit;
        }

        #send:hover {
            background: #333333;
        }

        #send:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }

        #reset {
            padding: 12px 16px;
            background: white;
            color: #999999;
            border: 1px solid #dddddd;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            font-family: inherit;
        }

        #reset:hover {
            color: #1a1a1a;
            border-color: #aaaaaa;
        }

        .empty {
            text-align: center;
            color: #cccccc;
            font-size: 14px;
            margin: auto;
        }
    </style>
</head>

<body>

    <header>
        <h1>Patient-Ψ</h1>
        <select id="mode-select" onchange="resetChat()">
            <option value="talk-to-psychologist">You are the patient</option>
            <option value="talk-to-patient">You are the psychologist</option>
        </select>
    </header>

    <div id="chat">
        <div class="empty" id="empty">Start the conversation below.</div>
    </div>

    <footer>
        <textarea id="input" placeholder="Type your message..." onkeydown="handleKey(event)"></textarea>
        <button id="reset" onclick="resetChat()">Reset</button>
        <button id="send" onclick="sendMessage()">Send</button>
    </footer>

    <script>
        let history = []
        const chat = document.getElementById("chat")
        const input = document.getElementById("input")
        const send = document.getElementById("send")
        const empty = document.getElementById("empty")
        const modeSelect = document.getElementById("mode-select")

        function getEndpoint() {
            return `http://localhost:8000/${modeSelect.value}`
        }

        function getLabel() {
            return modeSelect.value === "talk-to-psychologist" ? "Psychologist" : "Patient (Alex)"
        }

        function addMessage(text, type, label) {
            if (empty) empty.style.display = "none"
            const div = document.createElement("div")
            div.className = `message ${type}`
            if (type === "ai") {
                div.innerHTML = `<div class="label">${label}</div>${text.replace(/\n/g, "<br>")}`
            } else {
                div.innerHTML = text.replace(/\n/g, "<br>")
            }
            chat.appendChild(div)
            chat.scrollTop = chat.scrollHeight
        }

        function addTyping() {
            const div = document.createElement("div")
            div.className = "typing"
            div.id = "typing"
            div.textContent = `${getLabel()} is typing...`
            chat.appendChild(div)
            chat.scrollTop = chat.scrollHeight
        }

        function removeTyping() {
            const t = document.getElementById("typing")
            if (t) t.remove()
        }

        async function sendMessage() {
            const text = input.value.trim()
            if (!text) return

            addMessage(text, "user")
            input.value = ""
            send.disabled = true
            addTyping()

            try {
                const res = await fetch(getEndpoint(), {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ history, message: text })
                })

                const data = await res.json()
                removeTyping()
                history = data.history
                addMessage(data.response, "ai", getLabel())
            } catch (err) {
                removeTyping()
                addMessage("Error — make sure the API is running on localhost:8000", "ai", "Error")
            }

            send.disabled = false
            input.focus()
        }

        function resetChat() {
            history = []
            chat.innerHTML = '<div class="empty" id="empty">Start the conversation below.</div>'
        }

        function handleKey(e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault()
                sendMessage()
            }
        }
    </script>

</body>

</html>
